<p-toast position="top-right" />
<app-floatingconfigurator />

<div class="login-wrapper">
    <div class="login-card-outer">
        <div class="login-card">

            @if (!sent()) {
            <!-- Header -->
            <div class="login-header">
                <img src="./assets/img/logos/dentsys-logo.png" alt="DENTSYS" class="login-logo" />
                <h2 class="login-title">Recuperar contraseña</h2>
                <p class="login-subtitle">Ingresá tu email y te enviaremos las instrucciones.</p>
            </div>

            <!-- Form -->
            <form [formGroup]="forgotForm" (ngSubmit)="onSubmit()" novalidate>

                <div class="login-field">
                    <p-floatlabel>
                        <input pInputText id="email" formControlName="email" class="w-full" autocomplete="email"
                            type="email" />
                        <label for="email">Correo electrónico</label>
                    </p-floatlabel>
                    @if (emailInvalid) {
                    <small class="login-error">Ingresá un email válido.</small>
                    }
                </div>

                <p-button label="Enviar instrucciones" type="submit" styleClass="w-full" [loading]="loading()" />

            </form>
            } @else {
            <!-- Estado enviado -->
            <div class="login-header">
                <i class="pi pi-envelope-open"
                    style="font-size: 3rem; color: var(--p-primary-color); margin-bottom: 1rem;"></i>
                <h2 class="login-title">¡Revisá tu correo!</h2>
                <p class="login-subtitle">Si el email está registrado, recibirás las instrucciones para restablecer tu
                    contraseña.</p>
            </div>
            }

            <div class="login-back">
                <a (click)="goToLogin()">
                    <i class="pi pi-arrow-left"></i> Volver al inicio de sesión
                </a>
            </div>

        </div>
    </div>
</div>
