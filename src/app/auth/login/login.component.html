<p-toast position="top-right" />
<app-floatingconfigurator />

<div class="login-wrapper">
    <div class="login-card-outer">
        <div class="login-card">

            <!-- Header -->
            <div class="login-header">
                <img src="./assets/img/logos/dentsys-logo.png" alt="DENTSYS" class="login-logo" />
                <h2 class="login-title">Bienvenido a DENTSYS</h2>
                <p class="login-subtitle">Ingresá tus credenciales para continuar</p>
            </div>

            <!-- Form -->
            <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" novalidate>

                <div class="login-field">
                    <p-floatlabel>
                        <input pInputText id="username" formControlName="username" class="w-full"
                            autocomplete="username" />
                        <label for="username">Usuario</label>
                    </p-floatlabel>
                    @if (usernameInvalid) {
                    <small class="login-error">El usuario es requerido (mínimo 3 caracteres).</small>
                    }
                </div>

                <div class="login-field">
                    <p-floatlabel>
                        <p-password id="password" formControlName="password" [toggleMask]="true" [fluid]="true"
                            [feedback]="false" autocomplete="current-password" />
                        <label for="password">Contraseña</label>
                    </p-floatlabel>
                    @if (passwordInvalid) {
                    <small class="login-error">La contraseña es requerida (mínimo 6 caracteres).</small>
                    }
                </div>

                <div class="login-options">
                    <div class="login-remember">
                        <p-checkbox inputId="rememberMe" formControlName="rememberMe" [binary]="true" />
                        <label for="rememberMe">Recordarme</label>
                    </div>
                    <a class="login-forgot" (click)="goToForgot()">¿Olvidaste tu contraseña?</a>
                </div>

                <p-button label="Iniciar sesión" type="submit" styleClass="w-full" [loading]="loading()"
                    [disabled]="loginForm.invalid && loginForm.touched" />

            </form>

        </div>
    </div>
</div>
