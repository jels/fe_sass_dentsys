<div class="layout-topbar">

    <!-- Botón hamburguesa -->
    <button class="layout-menu-button layout-topbar-action" pTooltip="Menú" tooltipPosition="bottom"
        (click)="layoutService.onMenuToggle()">
        <i class="pi pi-bars"></i>
    </button>

    <!-- Logo -->
    <a class="layout-topbar-logo" routerLink="/modules/dashboard">
        <img src="./assets/img/logos/dentsys-logo.png" alt="DENTSYS" class="layout-topbar-logo__img" />
        <span class="layout-topbar-logo__text">DENTSYS</span>
    </a>

    <!-- Acciones -->
    <div class="layout-topbar-actions">

        <!-- Dark mode -->
        <button class="layout-topbar-action" pTooltip="Cambiar tema" tooltipPosition="bottom"
            (click)="toggleDarkMode()">
            <i [class]="layoutService.isDarkTheme() ? 'pi pi-sun' : 'pi pi-moon'"></i>
        </button>

        <!-- Configurator -->
        <app-configurator />

        <!-- Notificaciones (placeholder) -->
        <button class="layout-topbar-action" pTooltip="Notificaciones" tooltipPosition="bottom">
            <i class="pi pi-bell"></i>
        </button>

        <!-- Avatar / usuario -->
        <button class="layout-topbar-action layout-topbar-action--avatar" pTooltip="Cerrar sesión"
            tooltipPosition="bottom" (click)="openConfirmation()">
            <p-avatar [label]="fullName() | initials" shape="circle" styleClass="layout-topbar-avatar" />
        </button>

    </div>
</div>

<!-- Modal cierre de sesión -->
<p-dialog [(visible)]="displayConfirmation" header="Cerrar sesión" [modal]="true" [style]="{ width: '26rem' }">
    <div class="topbar-logout-body">
        <i class="pi pi-sign-out topbar-logout-icon"></i>
        <p>¿Estás seguro de que querés cerrar la sesión?</p>
    </div>
    <ng-template pTemplate="footer">
        <p-button label="Cancelar" severity="secondary" [text]="true" (onClick)="closeConfirmation(false)" />
        <p-button label="Cerrar sesión" severity="danger" (onClick)="closeConfirmation(true)" />
    </ng-template>
</p-dialog>
