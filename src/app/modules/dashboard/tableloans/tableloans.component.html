<div class="card">
    <div class="font-semibold text-xl mb-4">Recent Sales</div>
    <p-table [value]="products" [paginator]="true" [rows]="5">
        <ng-template #header>
            <tr>
                <th pSortableColumn="code">COD<p-sortIcon field="code"></p-sortIcon></th>
                <th pSortableColumn="price">Cedula <p-sortIcon field="price"></p-sortIcon></th>
                <th pSortableColumn="name">Nombre <p-sortIcon field="name"></p-sortIcon></th>
                <th pSortableColumn="quantity">Saldo <p-sortIcon field="quantity"></p-sortIcon></th>
                <th>View</th>
            </tr>
        </ng-template>
        <ng-template #body let-product>
            <tr>
                <td style="width: 15%; min-width: 5rem;">
                    {{ product.code }}
                </td>
                <td style="width: 35%; min-width: 7rem;">{{ product.price }}</td>
                <td style="width: 35%; min-width: 8rem;">{{ product.name }}</td>
                <td style="width: 35%; min-width: 8rem;">{{ product.quantity | number }}</td>
                <td style="width: 15%;">
                    <button pButton pRipple type="button" icon="pi pi-search"
                        class="p-button p-component p-button-text p-button-icon-only"></button>
                </td>
            </tr>
        </ng-template>
    </p-table>
</div>
